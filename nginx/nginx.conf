upstream backend {
    server backend:2053;
}

upstream frontend {
    server frontend:3000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name moneynote.store www.moneynote.store api.moneynote.store;
    return 301 https://$host$request_uri;
}

# Frontend: moneynote.store
server {
    listen 443 ssl;
    server_name moneynote.store www.moneynote.store;

    ssl_certificate /etc/letsencrypt/live/moneynote.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moneynote.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /_next/static/ {
        proxy_pass http://frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API: api.moneynote.store
server {
    listen 443 ssl;
    server_name api.moneynote.store;

    ssl_certificate /etc/letsencrypt/live/api.moneynote.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.moneynote.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
